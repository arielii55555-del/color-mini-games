<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מיני ארקייד</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffcede;
    color: rgb(255, 14, 98);
    text-align: center;
    transition: background 0.3s;
}
.hidden { display: none; }

button {
    padding: 12px 22px;
    font-size: 16px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    margin: 6px;
}
.menu button { background: #ff2c64; color: white; }
.back { background: #ff0059; color: rgb(255, 171, 193); margin-top: 20px; }

/* ===== קליקר ===== */
#clickBtn {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    font-size: 22px;
    color: white;
    background: #ff2c64;
}

.shop button {
    background: #ff5f8a;
    color: white;
    display: block;
    margin: 8px auto;
    width: 260px;
}

/* ===== צבעים ===== */
.color-box {
    display: inline-block;
    width: 120px;
    height: 120px;
    margin: 20px;
    border: 3px solid white;
    border-radius: 10px;
}

#options button {
    width: 80px;
    height: 80px;
}
</style>
</head>

<body>

<h1>🎮 מיני ארקייד</h1>

<!-- תפריט -->
<div id="menu" class="menu">
    <button onclick="openClicker()">קליקר</button>
    <button onclick="openColors()">נחש את הצבע</button>
</div>

<!-- ===== קליקר ===== -->
<div id="clickerGame" class="hidden">
    <h2>קליקר</h2>
    <div id="clickInfo">לחיצות: 0</div>
    <div id="clickTimer">זמן: 60</div>

    <button id="clickBtn">לחצי!</button>

    <h3>🛒 חנות</h3>
    <div class="shop">
        <button onclick="buyTime()">⏱️ +30 שניות (30)</button>
        <button onclick="buyDouble()">⚡ קליק כפול (50)</button>
    </div>

    <button class="back" onclick="backToMenu()">חזרה</button>
</div>

<!-- ===== נחש את הצבע ===== -->
<div id="colorGame" class="hidden">
    <h2>🎨 נחש את הצבע</h2>

    <div>
        <div class="color-box" id="color1"></div>
        <span style="font-size:40px;">+</span>
        <div class="color-box" id="color2"></div>
    </div>

    <div id="options"></div>
    <div id="score">Score: 0</div>

    <button class="back" onclick="backToMenu()">חזרה</button>
</div>

<script>
/* ===== ניווט ===== */
function backToMenu() {
    document.body.style.background = "#ffcede";
    document.getElementById("menu").classList.remove("hidden");
    document.getElementById("clickerGame").classList.add("hidden");
    document.getElementById("colorGame").classList.add("hidden");
    clearInterval(clickTimer);
}

function openClicker() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("clickerGame").classList.remove("hidden");
    startClicker();
}

function openColors() {
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("colorGame").classList.remove("hidden");
    pickRandomCombination();
}

/* ===== קליקר ===== */
let clicks = 0;
let power = 1;
let time = 60;
let clickTimer;

const clickBtn = document.getElementById("clickBtn");

clickBtn.onclick = () => {
    clicks += power;
    updateClicker();
};

function startClicker() {
    clicks = 0;
    power = 1;
    time = 60;
    updateClicker();
    document.getElementById("clickTimer").textContent = "זמן: 60";
    clearInterval(clickTimer);

    clickTimer = setInterval(() => {
        time--;
        document.getElementById("clickTimer").textContent = "זמן: " + time;
        if (time <= 0) {
            clearInterval(clickTimer);
            alert("נגמר הזמן! לחיצות: " + clicks);
        }
    }, 1000);
}

function updateClicker() {
    document.getElementById("clickInfo").textContent = "לחיצות: " + clicks;
}

function buyTime() {
    if (clicks >= 30) {
        clicks -= 30;
        time += 30;
        updateClicker();
    }
}

function buyDouble() {
    if (clicks >= 50 && power === 1) {
        clicks -= 50;
        power = 2;
        alert("קליק כפול הופעל ⚡");
        updateClicker();
    }
}

/* ===== נחש את הצבע ===== */
const combos = [
    { colors:["red","yellow"], result:"orange" },
    { colors:["red","blue"], result:"purple" },
    { colors:["blue","yellow"], result:"green" },
    { colors:["white","black"], result:"gray" },
    { colors:["red","white"], result:"pink" }
];

let score = 0;
let current = null;

function flashBackground(color) {
    document.body.style.background = color;
    setTimeout(() => {
        document.body.style.background = "#ffcede";
    }, 300);
}

function pickRandomCombination() {
    current = combos[Math.floor(Math.random() * combos.length)];
    document.getElementById("color1").style.background = current.colors[0];
    document.getElementById("color2").style.background = current.colors[1];
    generateOptions();
}

function generateOptions() {
    const options = document.getElementById("options");
    options.innerHTML = "";

    let choices = [current.result];
    while (choices.length < 3) {
        const r = combos[Math.floor(Math.random() * combos.length)].result;
        if (!choices.includes(r)) choices.push(r);
    }

    choices.sort(() => Math.random() - 0.5);

    choices.forEach(c => {
        const b = document.createElement("button");
        b.style.background = c;
        b.onclick = () => checkAnswer(c);
        options.appendChild(b);
    });
}

function checkAnswer(ans) {
    if (ans === current.result) {
        score++;
        flashBackground("green");
    } else {
        flashBackground("red");
    }
    document.getElementById("score").textContent = "Score: " + score;
    pickRandomCombination();
}
</script>

</body>
</html>
