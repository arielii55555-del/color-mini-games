<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>אתר המשחקים שלי</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ff0066;
    color: rgb(255, 255, 255);
    text-align: center;
    height: 100%;
}

html, body {
    height: 100%;
    margin: 0;
}

header {
    background: #ff0062;
    padding: 20px;
    font-size: 32px;
    font-weight: bold;
}

#menu {
    background: #ff006a;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
}

button {
    padding: 12px 20px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: #ffffff;
    color: rgb(255, 0, 98);
    transition: 0.2s;
}

button:hover {
    background: #ff4391;
    transform: scale(1.05);
}

#gameFrame {
    margin: 20px auto;
    border: 4px solid #292828;
    border-radius: 12px;
    background: rgb(26, 26, 26);
    width: 90%;
    height: 81vh;
    overflow: hidden;
}

/* ✨ ניצוצות עכבר */
.sparkle {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    animation: fadeOut 0.7s linear forwards;
}

@keyframes fadeOut {
    0% {
        transform: scale(1);
        opacity: 1;
    }
    100% {
        transform: scale(0);
        opacity: 0;
    }
}
</style>
</head>

<body>

<header>🎮 אתר המשחקים שלי 🎮</header>

<div id="menu">
    <button onclick="loadGame('jump.html')"> תקפצו!</button>
    <button onclick="loadGame('mixColors.html')"> !שילוב צבעים</button>
    <button onclick="loadGame('change colors.html')">משחק זיכרון מרקרים!</button>
    <button onclick="loadGame('herring.html')">דג מלוח!</button>
    <button onclick="loadGame('Clicker.try.html')">קליקר!</button>
    <button onclick="loadGame('איקס עיגול.try.html')">איקס עיגול!</button>
    <button onclick="loadGame('Variety of colors.html')"> נחש את הצבע!</button>
    <button onclick="loadGame('fireboy&watergirl.html')"> בן האש ובת המים !</button>
</div>

<iframe id="gameFrame" src=""></iframe>

<script>
function loadGame(file) {
    document.getElementById("gameFrame").src = file;
}

const gameFrame = document.getElementById("gameFrame");

gameFrame.addEventListener("load", () => {
    gameFrame.contentWindow.focus();
});

// ✨ אפקט ניצוצות לעכבר
document.addEventListener("mousemove", (e) => {
    const sparkle = document.createElement("div");
    sparkle.classList.add("sparkle");

    sparkle.style.left = e.clientX + "px";
    sparkle.style.top = e.clientY + "px";

    const colors = ["#ff4d6d", "#4dd4ff", "#ffd24d", "#b84dff", "#4dff88"];
    const color = colors[Math.floor(Math.random() * colors.length)];

    sparkle.style.background = "radial-gradient(circle, white, " + color + ")";

    document.body.appendChild(sparkle);

    setTimeout(() => {
        sparkle.remove();
    }, 700);
});
</script>

</body>
</html>
