<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>משחק זיכרון – מרקרים</title>

<style>
body {
    background: #1e1e1e;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

#game {
    display: grid;
    grid-template-columns: repeat(6, 90px);
    gap: 14px;
    justify-content: center;
    margin-top: 30px;
}

.card {
    width: 90px;
    height: 90px;
    background: #444;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

.card.revealed {
    background: #222;
}

/* מרקר */
.marker {
    width: 18px;
    height: 55px;
    border-radius: 4px;
    position: relative;
}

/* מכסה */
.marker::before {
    content: "";
    position: absolute;
    top: -12px;
    left: 0;
    width: 18px;
    height: 12px;
    background: #111;
    border-radius: 3px 3px 0 0;
}

/* קצה */
.marker::after {
    content: "";
    position: absolute;
    bottom: -6px;
    left: 0;
    width: 18px;
    height: 6px;
    background: #ddd;
    border-radius: 0 0 3px 3px;
}

#info {
    margin-top: 15px;
    font-size: 18px;
}
</style>
</head>
<body>

<h1>🖍️ משחק זיכרון – מרקרים</h1>
<div id="info">מהלכים: 0</div>
<div id="game"></div>

<script>
const colors = [
    "red","blue","green","yellow",
    "purple","orange","pink","brown",
    "cyan","lime","magenta","teal"
];

let cards = [...colors, ...colors];
cards.sort(() => Math.random() - 0.5);

const game = document.getElementById("game");
const info = document.getElementById("info");

let first = null;
let second = null;
let lock = false;
let moves = 0;
let matched = 0;

cards.forEach(color => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.color = color;

    const marker = document.createElement("div");
    marker.className = "marker";
    marker.style.background = color;
    marker.style.display = "none";

    card.appendChild(marker);

    card.addEventListener("click", () => {
        if (lock || card.classList.contains("revealed")) return;

        card.classList.add("revealed");
        marker.style.display = "block";

        if (!first) {
            first = card;
        } else {
            second = card;
            lock = true;
            moves++;
            info.textContent = "מהלכים: " + moves;

            if (first.dataset.color === second.dataset.color) {
                matched += 2;
                reset();
                if (matched === cards.length) {
                    setTimeout(() => alert("🎉 ניצחת!"), 300);
                }
            } else {
                setTimeout(() => {
                    hide(first);
                    hide(second);
                    reset();
                }, 900);
            }
        }
    });

    game.appendChild(card);
});

function hide(card) {
    card.classList.remove("revealed");
    card.firstChild.style.display = "none";
}

function reset() {
    [first, second] = [null, null];
    lock = false;
}
</script>

</body>
</html>
